version: 2

project_name: cpulse

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/cpulse
    binary: cpulse
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: hyturing
    name: compose-pulse
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
